<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      box-sizing: border-box;
      background: #fdfdfd;
    }

    h3 {
      margin-top: 0;
      font-size: 16px;
      color: #333;
    }

    p {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #444;
    }

    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #0070f3;
      box-shadow: 0 0 0 2px rgba(0, 112, 243, 0.2);
    }

    button {
      width: 100%;
      padding: 10px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #333;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #d32f2f;
      text-align: center;
      font-weight: bold;
    }

    .success {
      color: #2e7d32 !important;
    }
  </style>
</head>

<body>
  <h3>📸 Shop Capturer</h3>
  <p>クリーンなファーストビューをWebPで保存します。</p>

  <div class="input-group">
    <label for="slug">ショップ Slug</label>
    <input type="text" id="slug" placeholder="e.g. ssense" autocomplete="off" />
  </div>

  <button id="captureBtn">キャプチャ (WebP)</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>

</html>
